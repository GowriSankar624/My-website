<!DOCTYPE html>
<html>
<head>
<title>Semantic Example</title>

<style>

body{
background-image:url("demo.jpg");
background-repeat:no-repeat;
font-family:Arial;
}

header{
text-align:center;
padding:20px;
}

nav{
background-color:black;
padding:10px;
text-align:center;

}

nav a{
color:white;
margin:15px;
}

section{
padding:20px;
text-align:center;
background-color:rgba(255,255,255,0.8);
}

footer{
background-color:gray;
color:white;
text-align:center;
padding:10px;
}

</style>

</head>

<body>

<header>
<h1>My Website</h1>
<p>Welcome to my webpage</p>
</header>

<nav>
<a href="https://www.google.com">Home</a>
<a href="#">About</a>
<a href="#">Contact</a>
</nav>

<section>
<h2>About Us</h2>
<p>This is a simple webpage using semantic HTML elements.</p>
</section>

<footer>
<p>© 2026 My Website</p>
</footer>

</body>
</html>
